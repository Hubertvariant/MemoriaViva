<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letreiro Mario Bros Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #5C94FC 0%, #2859B1 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
        }

        .glass-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-top: 4px solid rgba(255, 255, 255, 0.2);
            border-bottom: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 60px 0;
            position: relative;
            overflow: hidden; /* Corta o que sair da largura da tela */
        }

        /* ANIMAÇÃO INFINITA */
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
            /* Movemos 50% porque o conteúdo está duplicado. 
               Quando chega no meio, ele reseta visualmente para o zero. */
        }

        .marquee-content {
            display: flex;
            white-space: nowrap;
            width: max-content; /* Garante que o container tenha o tamanho real do texto */
            animation: scroll var(--speed, 15s) linear infinite;
        }

        .pixel-text {
            font-size: 2.2rem;
            padding: 0 40px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
        }

        .mario-red { color: #FF0000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }
        .mario-yellow { color: #FFD700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }
        .mario-green { color: #43f11d; text-shadow: 0 0 15px rgba(67, 241, 29, 0.6); }
        .mario-white { color: #FFFFFF; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); }

        .bg-decor {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <div id="marquee" class="marquee-content">
            </div>
    </div>

    <div class="bg-decor">ROBSON 10/10 • HIGH SCORE: 999999</div>

    <script>
        const CONFIG = {
            texto: "IT'S-A ME, ROBSON! • MELHOR PROFESSOR DO MUNDO!! • OBRIGADO POR TUDO! •",
            velocidade: "40s", // Aumentei o tempo para ficar mais suave
            icones: ["🍄", "⭐", "💰", "🦖"]
        };

        const marquee = document.getElementById('marquee');

        function initMarquee() {
            marquee.style.setProperty('--speed', CONFIG.velocidade);
            
            // Criamos uma sequência de itens
            let segmentHTML = "";
            const colors = ['mario-white', 'mario-yellow', 'mario-red', 'mario-green'];
            
            // Criamos 6 blocos para garantir que preencha a tela
            for (let i = 0; i < 6; i++) {
                const colorClass = colors[i % colors.length];
                const icon = CONFIG.icones[i % CONFIG.icones.length];
                segmentHTML += `
                    <div class="flex items-center">
                        <span class="pixel-text ${colorClass}">
                            <span class="mr-6 scale-125">${icon}</span> ${CONFIG.texto}
                        </span>
                    </div>
                `;
            }

            // O TRUQUE: Duplicamos o conteúdo total (segmentHTML + segmentHTML)
            // Assim, quando a animação chega em -50%, a segunda metade é IDÊNTICA à primeira
            marquee.innerHTML = segmentHTML + segmentHTML;
        }

        window.onload = initMarquee;
    </script>
</body>
</html>
